# 开发模式 — 使用 H2 内存数据库，无需安装 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:free_canvas;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

logging:
  level:
    com.freecanvas: DEBUG
