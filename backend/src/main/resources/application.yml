server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/free_canvas?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== AI 模型配置 ====================
ai:
  # 豆包通用 API Key（通过环境变量 DOUBAO_API_KEY 注入）
  api-key: ${DOUBAO_API_KEY:}

  seedream:
    endpoint: https://ark.cn-beijing.volces.com/api/v3/images/generations
    model: doubao-seedream-3-0-t2i-250415

  seedance:
    endpoint: https://ark.cn-beijing.volces.com/api/v3/videos/generations
    model: doubao-seedance-2-0-t2v-250428

# ==================== 火山 TOS 对象存储 ====================
tos:
  access-key-id: ${TOS_ACCESS_KEY_ID:}
  secret-access-key: ${TOS_SECRET_ACCESS_KEY:}
  region: cn-beijing
  bucket: ark-auto-2115189665-cn-beijing-default
  endpoint-url: https://tos-cn-beijing.volces.com
  public-base-url: https://ark-auto-2115189665-cn-beijing-default.tos-cn-beijing.volces.com
  presign-expires: 2592000
  storage-type: tos

# 异步任务配置
async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 100

logging:
  level:
    com.freecanvas: DEBUG
